# Fly.io konfiguratsiyasi. "fly launch" app nomini so'raydi va shuni yangilaydi.
app = "kursbot"
primary_region = "fra"        # yaqin region: fra (Frankfurt), waw (Varshava)

[build]

[env]
  AUTO_INTERVAL = "600"
  NOTIFY_MIN_INTERVAL = "3600"
  REFRESH_TIMEOUT = "60"
  SOURCE_TIMEOUT = "10"
  # BOT_TOKEN ni maxfiy qo'ying:  fly secrets set BOT_TOKEN=...

[processes]
  app = "python bot.py"

# Polling bot — HTTP xizmat (port) kerak emas
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
